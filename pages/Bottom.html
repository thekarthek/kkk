<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Footer Section</title>
  <style>
    /* Reset & Base */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background-color: #f5f5f7; }

    .apple-footer {
      background: #1a3a4a;
      color: #fff;
      padding: 6rem 2rem 3rem 2rem;
      position: relative;
      margin-top: 150px;
    }

    /* The "Blob" organic top edge */
    .footer-wave-top {
      position: absolute;
      top: -80px;
      left: 0;
      width: 100%;
      height: 120px;
      background: #1a3a4a;
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    }

    .footer-content {
      display: grid;
      grid-template-columns: 1fr 2fr;
      max-width: 1100px;
      margin: 0 auto;
      gap: 5rem;
    }

    /* Newsletter Section */
    .brand { font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; }
    .newsletter-form {
      display: flex;
      background: #0d1f29;
      padding: 5px;
      border-radius: 12px;
      margin-top: 1rem;
      max-width: 350px;
    }
    .newsletter-form input {
      background: transparent;
      border: none;
      color: white;
      padding: 12px;
      flex: 1;
      outline: none;
    }
    .newsletter-form button {
      background: #ffcc00;
      border: none;
      padding: 0 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    /* Links Section */
    .footer-links { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; }
    .footer-links h4 { font-size: 0.75rem; opacity: 0.6; margin-bottom: 1.2rem; letter-spacing: 0.05em; }
    .footer-links ul { list-style: none; }
    .footer-links li { margin-bottom: 0.8rem; font-size: 0.9rem; cursor: pointer; opacity: 0.9; }
    .footer-links li:hover { opacity: 1; text-decoration: underline; }

    @media (max-width: 768px) {
      .footer-content { grid-template-columns: 1fr; }
      .footer-links { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<footer class="apple-footer">
  <div class="footer-wave-top"></div>
  
  <div class="footer-content">
    <div class="footer-left">
      <div class="brand">Karthik Bangaru</div>
      <p style="opacity: 0.8;">Want to know when I publish new system architecture or deep-dives?</p>
      <form class="newsletter-form">
        <input type="email" placeholder="email@address.com">
        <button type="submit">→</button>
      </form>
    </div>
    
    <div class="footer-links">
      <div>
        <h4>CATEGORIES</h4>
        <ul>
          <li>Systems</li>
          <li>Blockchain</li>
          <li>AI Research</li>
        </ul>
      </div>
      <div>
        <h4>INTERACTIVE</h4>
        <ul>
          <li>GitHub Repo</li>
          <li>Techfest Talk</li>
        </ul>
      </div>
      <div>
        <h4>GENERAL</h4>
        <ul>
          <li>About Karthek</li>
          <li>Contact</li>
          <li>Resume</li>
        </ul>
      </div>
    </div>
  </div>
</footer>

</body>
</html>
