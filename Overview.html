<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overview | Karthik Bangaru</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <style>
        :root {
            --bg: #050816;
            --surface: #0d1324;
            --border: rgba(255,255,255,0.08);
            --text: #ffffff;
            --muted: #94a3b8;
            --accent: #00d4ff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 60px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .bento-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 20px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 25px;
        }

        #map {
            width: 100%;
            height: 250px;
            border-radius: 20px;
            filter: invert(0.9) hue-rotate(180deg) brightness(0.95) contrast(0.9);
        }

        .social-link {
            font-size: 2.5rem;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: inline-block;
            text-decoration: none;
        }

        .social-link:hover {
            transform: translateY(-10px) scale(1.1);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="bento-grid">
        <div class="card" style="grid-column: span 6;">
            <div id="map"></div>
            <p style="margin-top: 20px; color: var(--muted); font-size: 0.95rem;">
                I'm from Hyderabad, India, roughly 3,000km away from your location.
            </p>
        </div>

        <div class="card" style="grid-column: span 6; background: #050816; border: 1px solid var(--border);">
            <h3 style="margin: 0 0 15px 0; font-size: 1rem; color: var(--muted);">Real-Time Data Throughput</h3>
            <canvas id="waveform-canvas" style="width: 100%; height: 150px;"></canvas>
        </div>

        <footer class="card" style="grid-column: span 6; text-align: center;">
            <h3 style="margin-bottom: 20px; font-weight: 600;">Let's connect.</h3>
            <div style="display: flex; justify-content: center; gap: 40px;">
                <a href="https://github.com/thekarthek" target="_blank" class="social-link">💻</a>
                <a href="https://linkedin.com/in/thekarthek" target="_blank" class="social-link">🔗</a>
                <a href="mailto:thekarthek@gmail.com" class="social-link">📧</a>
            </div>
        </footer>
    </div>
</div>

<script>
    // Initialize Map centered on Hyderabad
    var map = L.map('map', { 
        zoomControl: false, 
        attributionControl: false,
        dragging: false 
    }).setView([17.3850, 78.4867], 4);
    
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.marker([17.3850, 78.4867]).addTo(map);

    // CRITICAL FIX: Ensure map resizes correctly upon rendering the DOM
    setTimeout(function() {
        map.invalidateSize();
    }, 100);

    // Waveform Animation Logic
    const canvas = document.getElementById('waveform-canvas');
    const ctx = canvas.getContext('2d');

    function updateCanvasSize() {
        canvas.width = canvas.offsetWidth;
        canvas.height = 150;
    }
    window.addEventListener('resize', updateCanvasSize);
    updateCanvasSize();

    function drawWave(progress) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.beginPath();
        ctx.strokeStyle = '#00d4ff';
        ctx.lineWidth = 2;

        for (let i = 0; i < canvas.width; i++) {
            const y = 75 + Math.sin(i * 0.02 + progress * 5) * 30 * Math.cos(i * 0.005 + progress);
            i === 0 ? ctx.moveTo(i, y) : ctx.lineTo(i, y);
        }
        ctx.stroke();
    }

    gsap.to({}, {
        scrollTrigger: {
            trigger: "#waveform-canvas",
            start: "top bottom",
            end: "bottom top",
            scrub: 0.5,
            onUpdate: (self) => drawWave(self.progress)
        }
    });
</script>

</body>
</html>
